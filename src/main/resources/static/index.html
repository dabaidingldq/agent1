<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>企业 HR 智能体系统</title>
</head>
<body>
<script>
    async function checkLogin() {
        try {
            const res = await fetch('/auth/current', {
                method: 'GET',
                credentials: 'include'
            });
            const data = await res.json();

            if (data.code === 0 && data.data && data.data.redirectUrl) {
                window.location.href = data.data.redirectUrl;
            } else {
                window.location.href = '/login.html';
            }
        } catch (e) {
            window.location.href = '/login.html';
        }
    }

    checkLogin();
</script>
</body>
</html>

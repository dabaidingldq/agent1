<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理员端 - 全部审批</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f3f4f6;
            color: #111827;
        }
        .topbar {
            background: #111827;
            color: #fff;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar a {
            color: #93c5fd;
            text-decoration: none;
            margin-left: 16px;
        }
        .container {
            max-width: 1320px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            margin-bottom: 18px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        input, select, textarea, button {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
        }
        textarea { min-height: 72px; width: 100%; }
        button {
            cursor: pointer;
            background: #2563eb;
            color: white;
            border: none;
        }
        button.secondary { background: #6b7280; }
        button.success { background: #16a34a; }
        button.danger { background: #dc2626; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            background: #fff;
        }
        th, td {
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 10px;
            text-align: left;
            vertical-align: top;
            font-size: 14px;
        }
        th { background: #f9fafb; }
        .row-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .muted { color: #6b7280; font-size: 13px; }
        .section-title { margin: 0 0 12px; }
        .status-bar {
            margin-top: 10px;
            color: #2563eb;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>
<div class="topbar">
    <div><strong>管理员审批中心</strong></div>
    <div>
        <a href="/admin/chat.html">返回管理员助手</a>
        <a href="/admin/audit.html">审计日志</a>
        <a href="/admin/budget.html">预算管理</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2 class="section-title">查询条件</h2>
        <div class="toolbar">

            <label>业务类型：
                <select id="businessType">
                    <option value="">全部</option>
                    <option value="LEAVE">请假</option>
                    <option value="CERTIFICATE">证明开具</option>
                    <option value="OFFICE_SUPPLY">办公用品</option>
                    <option value="EXPENSE">报销</option>
                </select>
            </label>
            <label>状态：
                <select id="status">
                    <option value="">全部</option>
                    <option value="PENDING">待审批</option>
                    <option value="PENDING_REVIEW">待复核</option>
                    <option value="APPROVED">已通过</option>
                    <option value="REJECTED">已驳回</option>
                </select>
            </label>
            <button onclick="loadPending()">查询待审批</button>
            <button class="secondary" onclick="loadAll()">查询全部</button>
        </div>
        <div class="status-bar" id="message"></div>
    </div>

    <div class="card">
        <h2 class="section-title">审批备注</h2>
        <textarea id="comment" placeholder="可填写审批备注。"></textarea>
    </div>

    <div class="card">
        <h2 class="section-title">全部审批列表</h2>
        <table>
            <thead>
            <tr>
                <th>审批ID</th>
                <th>申请人</th>
                <th>业务类型</th>
                <th>当前状态</th>
                <th>当前节点</th>
                <th>申请摘要</th>
                <th>提交时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="approvalTableBody">
            <tr><td colspan="8" class="muted">点击上方按钮加载数据</td></tr>
            </tbody>
        </table>
    </div>
</div>
<script src="/assets/auth.js"></script>
<script>
    let currentUser = null;

    function buildQuery(includeStatus) {
        const businessType = document.getElementById('businessType').value;
        const status = document.getElementById('status').value;

        const params = new URLSearchParams();

        if (businessType) {
            params.set('businessType', businessType);
        }

        if (includeStatus && status) {
            params.set('status', status);
        }

        return params.toString();
    }

    async function loadPending() {
        try {
            setMessage('正在加载待审批列表...');
            const query = buildQuery(false);
            const res = await sessionFetch(`/manage/approvals/pending${query ? '?' + query : ''}`, {
                method: 'GET'
            });
            const data = await res.json();
            renderTable(data.data || []);
            setMessage(data.message || '待审批列表已刷新');
        } catch (e) {
            renderTable([]);
            setMessage('加载待审批列表失败：' + e.message);
        }
    }

    async function loadAll() {
        try {
            setMessage('正在加载全部审批列表...');
            const query = buildQuery(true);
            const res = await sessionFetch(`/manage/approvals/all${query ? '?' + query : ''}`, {
                method: 'GET'
            });
            const data = await res.json();
            renderTable(data.data || []);
            setMessage(data.message || '全部审批列表已刷新');
        } catch (e) {
            renderTable([]);
            setMessage('加载全部审批列表失败：' + e.message);
        }
    }

    function renderTable(rows) {
        const tbody = document.getElementById('approvalTableBody');

        if (!Array.isArray(rows) || !rows.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="muted">暂无数据</td></tr>';
            return;
        }

        tbody.innerHTML = rows.map(row => `
            <tr>
                <td>${escapeHtml(row.id ?? '--')}</td>
                <td>
                    ${escapeHtml(row.employeeName ?? '--')}
                    <div class="muted">userId: ${escapeHtml(row.applicantUserId ?? '--')}</div>
                </td>
                <td>${escapeHtml(row.businessType ?? '--')}</td>
                <td>${escapeHtml(row.status ?? '--')}</td>
                <td>${escapeHtml(row.currentNode ?? '--')}</td>
                <td>${escapeHtml(row.detailSummary || '--')}</td>
                <td>${formatTime(row.createdAt)}</td>
                <td>
                    <div class="row-actions">
                        ${(row.status === 'PENDING' || row.status === 'PENDING_REVIEW')
            ? `
                              <button class="success" onclick="handleApproval(${row.id}, 'approve')">通过</button>
                              <button class="danger" onclick="handleApproval(${row.id}, 'reject')">驳回</button>
                              <button class="secondary" onclick="resetApproval(${row.id}, '${row.status}')">修改词条</button>
                              `
            : `
                              <button class="secondary" onclick="resetApproval(${row.id}, '${row.status}')">修改词条</button>
                              `
        }
                    </div>
                </td>
            </tr>
        `).join('');
    }

    async function handleApproval(id, action) {
        const comment = document.getElementById('comment').value || '';
        const actionText = action === 'approve' ? '通过' : '驳回';
        const confirmed = confirm(`确认要对审批单 #${id} 执行${actionText}吗？`);

        if (!confirmed) {
            return;
        }

        try {
            setMessage(`正在提交审批操作：#${id} ...`);

            const res = await sessionFetch(`/manage/approvals/${id}/${action}`, {
                method: 'POST',
                body: JSON.stringify({ comment })
            });

            const data = await res.json();
            alert(data.data || data.message || '操作完成');
            await loadAll();
        } catch (e) {
            alert('操作失败：' + e.message);
            setMessage('操作失败：' + e.message);
        }
    }

    async function resetApproval(id, status) {
        if (status === 'PENDING' || status === 'PENDING_REVIEW') {
            alert('已是待审批状态');
            return;
        }

        const confirmed = confirm(`确认将审批单 #${id} 重置为待审批状态吗？`);

        if (!confirmed) {
            return;
        }

        try {
            setMessage(`正在重置审批单：#${id} ...`);

            const res = await sessionFetch(`/manage/approvals/${id}/reset`, {
                method: 'POST'
            });

            const data = await res.json();
            alert(data.data || data.message || '操作完成');
            await loadAll();
        } catch (e) {
            alert('重置失败：' + e.message);
            setMessage('重置失败：' + e.message);
        }
    }

    function setMessage(msg) {
        document.getElementById('message').textContent = msg || '';
    }

    function formatTime(value) {
        if (!value) return '--';
        return String(value).replace('T', ' ');
    }

    function escapeHtml(text) {
        return String(text ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    async function initPage() {
        currentUser = await getCurrentUser('ADMIN');
        if (!currentUser) {
            return;
        }

        await loadPending();
    }

    initPage();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理员端 - 智能助手</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            color: #111827;
        }
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: #111827;
            color: #fff;
            padding: 20px;
        }
        .sidebar h2 { margin: 0 0 18px; font-size: 22px; }
        .new-chat-btn {
            width: 100%;
            border: none;
            background: #7c3aed;
            color: #fff;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            margin-bottom: 18px;
        }
        .menu a {
            display: block;
            color: #ddd6fe;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.06);
        }
        .main { padding: 24px; }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }
        .topbar a {
            text-decoration: none;
            color: #7c3aed;
            margin-left: 12px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            margin-bottom: 18px;
        }
        .quick-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .quick-links a, .quick-links button {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 10px;
            background: #f5f3ff;
            color: #5b21b6;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .chat-box {
            min-height: 340px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            background: #fafafa;
            overflow: auto;
        }
        .msg {
            margin-bottom: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .msg.user { color: #111827; }
        .msg.assistant { color: #5b21b6; }
        .composer {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 12px;
            margin-top: 14px;
        }
        textarea, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
        }
        button.send-btn {
            border: none;
            background: #7c3aed;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
        }
        .inline-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .inline-form label { min-width: 180px; }
        .tips {
            color: #6b7280;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>管理员助手</h2>
        <button class="new-chat-btn" onclick="newChat()">+ 新建对话</button>
        <div class="menu">
            <a href="/index.html">返回首页</a>
            <a href="/admin/chat.html">管理员助手</a>
            <a href="/admin/approvals.html">全部审批</a>
            <a href="/admin/budget.html">预算管理</a>
            <a href="/admin/audit.html">审计日志</a>
            <a href="/admin/knowledge.html">知识库管理</a>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1 style="margin:0;font-size:28px;">管理员端 - 智能助手</h1>
                <div style="color:#6b7280;margin-top:6px;">支持预算管理、审计查询、知识库管理与全部审批处理。</div>
            </div>
            <div>
                <a href="/admin/approvals.html">全部审批</a>
                <a href="/admin/budget.html">预算管理</a>
                <a href="/admin/audit.html">审计日志</a>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">快捷入口</h3>
            <div class="quick-links">
                <a href="/admin/approvals.html">全部审批</a>
                <a href="/admin/budget.html">预算查询</a>
                <a href="/admin/knowledge.html">知识库管理</a>
                <a href="/admin/audit.html">审计日志</a>
                <button type="button" onclick="fillExample('请查询全部待审批单')">查询待审批</button>
                <button type="button" onclick="fillExample('通过ID为1的请求，备注：管理员同意')">审批通过示例</button>
                <button type="button" onclick="fillExample('驳回ID为1的请求，备注：材料缺失')">审批驳回示例</button>
            </div>
        </div>

        <div class="card">
            <div class="inline-form">
                <label>
                    当前管理员用户 ID
                    <input id="userId" type="number" value="1" />
                </label>
                <label>
                    chatId
                    <input id="chatId" type="text" value="admin-chat-001" />
                </label>
            </div>

            <div class="chat-box" id="chatBox">
                <div class="msg assistant">您好，我是管理员智能助手。您可以直接说：“查询全部待审批单” 或 “通过ID为1的请求”。</div>
            </div>

            <div class="composer">
                <textarea id="message" placeholder="请输入消息，例如：通过ID为1的请求，备注：管理员同意"></textarea>
                <button class="send-btn" onclick="sendMessage()">发送</button>
            </div>

            <div class="tips">
                常见问题：管理员能力说明、预算规则、知识库影响范围、审批兜底处理
            </div>
        </div>
    </main>
</div>

<script>
    function newChat() {
        document.getElementById('chatId').value = 'admin-chat-' + Date.now();
        document.getElementById('chatBox').innerHTML =
            '<div class="msg assistant">已创建新会话。您可以直接开始提问。</div>';
    }

    function fillExample(text) {
        document.getElementById('message').value = text;
    }

    function appendMessage(role, text) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.textContent = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
        const userId = Number(document.getElementById('userId').value);
        const chatId = document.getElementById('chatId').value.trim();
        const message = document.getElementById('message').value.trim();

        if (!userId) {
            alert('请填写 userId');
            return;
        }
        if (!chatId) {
            alert('请填写 chatId');
            return;
        }
        if (!message) {
            alert('请输入消息');
            return;
        }

        appendMessage('user', message);
        document.getElementById('message').value = '';

        try {
            const res = await fetch('/ai/admin/chat/sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chatId,
                    userId,
                    tenantId: 'default',
                    role: 'ADMIN',
                    message
                })
            });
            const text = await res.text();
            appendMessage('assistant', text || '系统未返回内容');
        } catch (e) {
            appendMessage('assistant', '请求失败：' + e.message);
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>员工端 - HR 智能助手</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <link href="https://unpkg.com/layui@2.13.4/dist/css/layui.css" rel="stylesheet">
    <link href="../assets/css/common.css" rel="stylesheet">
    <style>
        .chat-layout { display: flex; height: 100vh; background: #f7f8fa; }
        .session-sidebar {
            width: 260px; background: #111827; color: #fff;
            display: flex; flex-direction: column;
        }
        .session-header {
            padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .session-list {
            flex: 1; overflow-y: auto; padding: 8px;
        }
        .session-item {
            padding: 12px; border-radius: 10px; cursor: pointer;
            margin-bottom: 8px; background: rgba(255,255,255,0.04);
        }
        .session-item.active { background: #1e9fff; }
        .session-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .session-last {
            font-size: 12px; opacity: 0.85; line-height: 1.6;
            max-height: 38px; overflow: hidden;
        }
        .chat-main {
            flex: 1; display: flex; flex-direction: column;
            min-width: 0;
        }
        .chat-topbar {
            height: 60px; background: #fff; border-bottom: 1px solid #eee;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        .main-content {
            flex: 1; display: flex; min-height: 0;
        }
        .chat-center {
            flex: 1; display: flex; flex-direction: column; min-width: 0;
        }
        .chat-scroll {
            flex: 1; overflow-y: auto; padding: 20px;
        }
        .msg-row {
            margin-bottom: 16px; display: flex; flex-direction: column;
        }
        .msg-row.user { align-items: flex-end; }
        .msg-bubble {
            max-width: 72%; padding: 12px 14px; border-radius: 14px;
            line-height: 1.8; white-space: pre-wrap; word-break: break-word;
            background: #fff; border: 1px solid #eee;
        }
        .msg-row.user .msg-bubble {
            background: #1e9fff; color: #fff; border: none;
        }
        .chat-input-area {
            background: #fff; border-top: 1px solid #eee; padding: 16px 20px;
        }
        .empty-tip {
            color: #999; text-align: center; margin-top: 80px;
        }
        .right-panel {
            width: 300px; border-left: 1px solid #eee; background: #fff;
            overflow-y: auto; padding: 16px;
        }
        .panel-card {
            border: 1px solid #eee; border-radius: 12px; padding: 16px; margin-bottom: 16px;
        }
        .panel-card h3 {
            font-size: 16px; font-weight: 700; margin-bottom: 12px;
        }
        .quick-btn {
            width: 100%; text-align: left; margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="chat-layout">
    <div class="session-sidebar">
        <div class="session-header">
            <button class="layui-btn layui-btn-fluid" id="newChatBtn">+ 新建对话</button>
        </div>
        <div class="session-list" id="sessionList"></div>
    </div>

    <div class="chat-main">
        <div class="chat-topbar">
            <div>
                <div style="font-size:18px;font-weight:700;">员工智能助手</div>
                <div style="font-size:12px;color:#999;" id="currentChatLabel">未选择会话</div>
            </div>
            <div>
                <a class="layui-btn layui-btn-primary layui-btn-sm" href="./dashboard.html">个人看板</a>
                <a class="layui-btn layui-btn-primary layui-btn-sm" href="./notifications.html">消息中心</a>
                <a class="layui-btn layui-btn-primary layui-btn-sm" href="./approvals.html">审批进度</a>
            </div>
        </div>

        <div class="main-content">
            <div class="chat-center">
                <div class="chat-scroll" id="chatScroll">
                    <div class="empty-tip">请选择左侧历史对话，或点击“新建对话”开始聊天。</div>
                </div>

                <div class="chat-input-area">
                    <div class="layui-input-group">
                        <input type="text" id="messageInput" class="layui-input" placeholder="请输入你的问题，例如：我今年年假还剩多少？">
                        <div class="layui-input-suffix">
                            <button class="layui-btn" id="sendBtn">发送</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="panel-card">
                    <h3>快捷入口</h3>
                    <button class="layui-btn layui-btn-primary quick-btn quick-question" data-question="我今年年假还剩多少？">年假余额</button>
                    <button class="layui-btn layui-btn-primary quick-btn quick-question" data-question="帮我请本周五下午半天事假，原因是家里有事">请假申请</button>
                    <button class="layui-btn layui-btn-primary quick-btn quick-question" data-question="帮我申请两支黑色签字笔和一个笔记本">办公用品申请</button>
                    <button class="layui-btn layui-btn-primary quick-btn quick-question" data-question="帮我开一个在职证明，租房要用">在职证明</button>
                    <button class="layui-btn layui-btn-primary quick-btn quick-question" data-question="帮我创建一个报销草稿，金额128.5，发票抬头是某某科技有限公司，类型是交通费，备注打车报销">报销草稿</button>
                    <button class="layui-btn layui-btn-primary quick-btn quick-question" data-question="帮我预约明天下午3点到4点的面试间A，用于技术面试">会议室预约</button>
                    <button class="layui-btn layui-btn-primary quick-btn quick-question" data-question="帮我申请一个访客预约，访客叫王五，手机号13700000000，明天来访，原因是商务来访">访客申请</button>
                </div>

                <div class="panel-card">
                    <h3>常见问答</h3>
                    <button class="layui-btn layui-btn-normal quick-btn quick-question" data-question="入职第一天要带什么？">入职流程</button>
                    <button class="layui-btn layui-btn-normal quick-btn quick-question" data-question="离职最后一天要交接哪些 IT 设备？">离职流程</button>
                    <button class="layui-btn layui-btn-normal quick-btn quick-question" data-question="育儿假怎么休？">育儿假政策</button>
                    <button class="layui-btn layui-btn-normal quick-btn quick-question" data-question="报销贴票有什么要求？">报销标准</button>
                    <button class="layui-btn layui-btn-normal quick-btn quick-question" data-question="我最近一条审批现在到哪一步了？">审批进度</button>
                </div>

                <div class="panel-card">
                    <h3>使用说明</h3>
                    <div class="layui-text">
                        <p>左侧可以查看历史会话。</p>
                        <p>中间用于持续多轮聊天。</p>
                        <p>右侧按钮可直接点击发起常见问题或事务。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/layui@2.13.4/dist/layui.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/request.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
    layui.use(['layer'], function () {
        const layer = layui.layer;

        setCurrentUser({
            userId: 1001,
            role: 'EMPLOYEE',
            tenantId: 'company-a',
            displayName: '员工用户'
        });

        const currentUser = getCurrentUser();
        let currentChatId = '';
        let sessionListData = [];

        const sessionListEl = document.getElementById('sessionList');
        const chatScrollEl = document.getElementById('chatScroll');
        const currentChatLabelEl = document.getElementById('currentChatLabel');
        const messageInputEl = document.getElementById('messageInput');

        function createChatId() {
            return 'chat-' + Date.now();
        }

        function escapeHtml(text) {
            return (text || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function renderSessions() {
            if (!sessionListData.length) {
                sessionListEl.innerHTML = '<div style="padding:16px;color:#bbb;">暂无历史会话</div>';
                return;
            }

            sessionListEl.innerHTML = sessionListData.map(item => `
      <div class="session-item ${item.chatId === currentChatId ? 'active' : ''}" data-chat-id="${item.chatId}">
        <div class="session-title">${escapeHtml(item.title || '新对话')}</div>
        <div class="session-last">${escapeHtml(item.lastMessage || '')}</div>
      </div>
    `).join('');

            document.querySelectorAll('.session-item').forEach(el => {
                el.addEventListener('click', async () => {
                    currentChatId = el.dataset.chatId;
                    renderSessions();
                    await loadMessages(currentChatId);
                });
            });
        }

        function renderMessages(messages) {
            if (!messages || !messages.length) {
                chatScrollEl.innerHTML = '<div class="empty-tip">当前会话还没有消息。</div>';
                return;
            }

            chatScrollEl.innerHTML = messages.map(msg => `
      <div class="msg-row ${msg.senderType === 'USER' ? 'user' : 'assistant'}">
        <div class="msg-bubble">${escapeHtml(msg.content)}</div>
      </div>
    `).join('');

            chatScrollEl.scrollTop = chatScrollEl.scrollHeight;
        }

        async function loadSessions() {
            const res = await get(`/chat/session/list?userId=${currentUser.userId}&role=${currentUser.role}`);
            sessionListData = res.data || [];
            renderSessions();
        }

        async function loadMessages(chatId) {
            currentChatLabelEl.innerText = `当前会话：${chatId}`;
            const res = await get(`/chat/session/messages?chatId=${chatId}&userId=${currentUser.userId}`);
            renderMessages(res.data || []);
        }

        async function sendMessage(messageText) {
            const message = (messageText ?? messageInputEl.value).trim();
            if (!message) {
                layer.msg('请输入内容');
                return;
            }

            if (!currentChatId) {
                currentChatId = createChatId();
                currentChatLabelEl.innerText = `当前会话：${currentChatId}`;
            }

            messageInputEl.value = '';

            const existing = chatScrollEl.querySelector('.empty-tip');
            if (existing) {
                chatScrollEl.innerHTML = '';
            }

            chatScrollEl.innerHTML += `
      <div class="msg-row user">
        <div class="msg-bubble">${escapeHtml(message)}</div>
      </div>
      <div class="msg-row assistant" id="assistant-loading">
        <div class="msg-bubble">处理中，请稍候...</div>
      </div>
    `;
            chatScrollEl.scrollTop = chatScrollEl.scrollHeight;

            try {
                const body = {
                    chatId: currentChatId,
                    userId: currentUser.userId,
                    tenantId: currentUser.tenantId,
                    role: currentUser.role,
                    message
                };

                const result = await post('/ai/employee/chat/sync', body);

                const loadingEl = document.getElementById('assistant-loading');
                if (loadingEl) {
                    loadingEl.outerHTML = `
          <div class="msg-row assistant">
            <div class="msg-bubble">${escapeHtml(result)}</div>
          </div>
        `;
                }

                await loadSessions();
            } catch (e) {
                const loadingEl = document.getElementById('assistant-loading');
                if (loadingEl) {
                    loadingEl.outerHTML = `
          <div class="msg-row assistant">
            <div class="msg-bubble">请求失败：${escapeHtml(e.message)}</div>
          </div>
        `;
                }
            }

            chatScrollEl.scrollTop = chatScrollEl.scrollHeight;
        }

        document.getElementById('newChatBtn').addEventListener('click', function () {
            currentChatId = createChatId();
            currentChatLabelEl.innerText = `当前会话：${currentChatId}`;
            chatScrollEl.innerHTML = '<div class="empty-tip">新会话已创建，现在可以开始聊天。</div>';
            renderSessions();
        });

        document.getElementById('sendBtn').addEventListener('click', () => sendMessage());
        messageInputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.querySelectorAll('.quick-question').forEach(btn => {
            btn.addEventListener('click', () => sendMessage(btn.dataset.question));
        });

        loadSessions();
    });
</script>
</body>
</html>

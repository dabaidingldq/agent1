<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>员工端 - 审批进度</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://unpkg.com/layui@2.13.4/dist/css/layui.css" rel="stylesheet">
    <link href="../assets/css/common.css" rel="stylesheet">
</head>
<body>
<div class="layui-layout layui-layout-admin">
    <div class="layui-header">
        <div class="layui-logo layui-hide-xs layui-bg-black">员工端 HR 助手</div>
        <ul class="layui-nav layui-layout-right">
            <li class="layui-nav-item"><a href="./chat.html">智能助手</a></li>
            <li class="layui-nav-item"><a href="./notifications.html">消息中心</a></li>
        </ul>
    </div>

    <div class="layui-side layui-bg-black">
        <div class="side-menu-title">员工菜单</div>
        <ul class="layui-nav layui-nav-tree layui-bg-black">
            <li class="layui-nav-item"><a href="./chat.html">智能助手</a></li>
            <li class="layui-nav-item"><a href="./applications.html">我的申请</a></li>
            <li class="layui-nav-item layui-this"><a href="./approvals.html">审批进度</a></li>
            <li class="layui-nav-item"><a href="./dashboard.html">个人看板</a></li>
            <li class="layui-nav-item"><a href="./notifications.html">消息中心</a></li>
        </ul>
    </div>

    <div class="layui-body">
        <div class="page-container">
            <div class="page-card">
                <div class="flex-between">
                    <h2 class="layui-font-20">审批进度与历史审批</h2>
                    <button class="layui-btn" id="refreshBtn">刷新</button>
                </div>
            </div>

            <div class="layui-row layui-col-space16">
                <div class="layui-col-md5">
                    <div class="page-card">
                        <h3 class="layui-font-18">最近一条审批进度</h3>
                        <div class="layui-form" style="margin-top: 12px;">
                            <div class="layui-form-item">
                                <label class="layui-form-label">业务类型</label>
                                <div class="layui-input-block">
                                    <select id="latestBusinessType">
                                        <option value="">全部</option>
                                        <option value="LEAVE">请假</option>
                                        <option value="OFFICE_SUPPLY">办公用品</option>
                                        <option value="CERTIFICATE">证明开具</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <button class="layui-btn" id="loadLatestBtn">查询最新进度</button>
                            </div>
                        </div>

                        <div class="layui-bg-gray" style="padding: 16px; border-radius: 8px;">
                            <p><strong>审批 ID：</strong><span id="latestApprovalId">--</span></p>
                            <p><strong>业务类型：</strong><span id="latestBusinessTypeText">--</span></p>
                            <p><strong>当前状态：</strong><span id="latestStatus">--</span></p>
                            <p><strong>当前节点：</strong><span id="latestNode">--</span></p>
                            <p><strong>停留时长：</strong><span id="latestStayDays">--</span></p>
                            <p><strong>预计剩余时长：</strong><span id="latestEstimate">--</span></p>
                            <p><strong>可否催办：</strong><span id="latestCanRemind">--</span></p>
                        </div>

                        <div style="margin-top: 12px;">
                            <button class="layui-btn layui-btn-normal" id="remindBtn">发送催办</button>
                        </div>
                    </div>
                </div>

                <div class="layui-col-md7">
                    <div class="page-card">
                        <div class="flex-between">
                            <h3 class="layui-font-18">历史审批</h3>
                            <div class="layui-form layui-form-pane" style="display: flex; gap: 8px; align-items: center;">
                                <select id="historyBusinessType">
                                    <option value="">全部</option>
                                    <option value="LEAVE">请假</option>
                                    <option value="OFFICE_SUPPLY">办公用品</option>
                                    <option value="CERTIFICATE">证明开具</option>
                                </select>
                                <input type="month" id="historyMonth" class="layui-input" style="width: 180px;">
                                <button class="layui-btn layui-btn-primary" id="searchHistoryBtn">查询</button>
                            </div>
                        </div>
                        <table class="layui-hide" id="historyTable" lay-filter="historyTable"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/layui@2.13.4/dist/layui.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/request.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
    layui.use(['table', 'form', 'layer'], function () {
        const table = layui.table;
        const form = layui.form;
        const layer = layui.layer;
        const currentUser = getCurrentUser();

        let latestApproval = null;

        async function loadLatestApproval() {
            const businessType = document.getElementById('latestBusinessType').value || null;
            try {
                const body = {
                    chatId: `chat-latest-approval-${Date.now()}`,
                    userId: currentUser.userId,
                    tenantId: currentUser.tenantId,
                    role: currentUser.role,
                    message: businessType
                        ? `查询我最近一条 ${businessType} 审批进度`
                        : '查询我最近一条审批进度'
                };
                const result = await post('/ai/employee/chat/sync', body);
                layer.msg('已通过聊天接口查询，结果显示在弹窗中');
                layer.open({
                    type: 1,
                    area: ['680px', '420px'],
                    title: '最新审批进度结果',
                    content: `<div style="padding:16px; line-height:1.8; white-space:pre-wrap;">${result}</div>`
                });
            } catch (e) {
                layer.msg(`查询失败：${e.message}`);
            }
        }

        async function loadHistory() {
            const businessType = document.getElementById('historyBusinessType').value || '';
            const month = document.getElementById('historyMonth').value || '';
            try {
                const url = `/employee/approvals/history?userId=${currentUser.userId}&businessType=${encodeURIComponent(businessType)}&month=${encodeURIComponent(month)}`;
                const res = await get(url);
                const rows = res.data || [];
                table.render({
                    elem: '#historyTable',
                    data: rows,
                    cols: [[
                        { field: 'approvalId', title: '审批 ID', width: 100 },
                        { field: 'businessType', title: '业务类型', width: 150 },
                        { field: 'status', title: '状态', width: 120 },
                        { field: 'applicantName', title: '申请人', width: 120 },
                        { field: 'createdAt', title: '创建时间', minWidth: 180 }
                    ]]
                });
            } catch (e) {
                table.render({
                    elem: '#historyTable',
                    data: [],
                    cols: [[
                        { field: 'approvalId', title: '审批 ID', width: 100 },
                        { field: 'businessType', title: '业务类型', width: 150 },
                        { field: 'status', title: '状态', width: 120 },
                        { field: 'applicantName', title: '申请人', width: 120 },
                        { field: 'createdAt', title: '创建时间', minWidth: 180 }
                    ]]
                });
                layer.msg('历史审批接口未接好或暂无数据');
            }
        }

        document.getElementById('loadLatestBtn').addEventListener('click', loadLatestApproval);
        document.getElementById('searchHistoryBtn').addEventListener('click', loadHistory);
        document.getElementById('refreshBtn').addEventListener('click', function () {
            loadHistory();
        });

        document.getElementById('remindBtn').addEventListener('click', async function () {
            const approvalId = prompt('请输入要催办的审批 ID');
            if (!approvalId) return;
            try {
                const body = {
                    chatId: `chat-remind-${Date.now()}`,
                    userId: currentUser.userId,
                    tenantId: currentUser.tenantId,
                    role: currentUser.role,
                    message: `帮我催办审批单 ${approvalId}`
                };
                const res = await post('/ai/employee/chat/sync', body);
                layer.alert(res);
            } catch (e) {
                layer.msg(`催办失败：${e.message}`);
            }
        });

        form.render();
        loadHistory();
    });
</script>
</body>
</html>

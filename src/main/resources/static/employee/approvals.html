<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>员工端 - 审批进度</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/css/layui.css" />
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: #f5f7fb;
            font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #1f2937;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 190px;
            background: #28323c;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 15px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar-group-title {
            padding: 14px 20px 8px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
        }

        .menu-item {
            display: block;
            padding: 14px 20px;
            color: #dbe4ee;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        .menu-item.active {
            background: #27c2b8;
            color: #fff;
        }

        .main {
            flex: 1;
            min-width: 0;
        }

        .topbar {
            height: 56px;
            background: #1f2730;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 28px;
            gap: 28px;
        }

        .topbar a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .content {
            padding: 16px;
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
            margin-bottom: 16px;
        }

        .panel-header {
            padding: 20px 24px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #111827;
        }

        .panel-body {
            padding: 0 16px 16px;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .overview-card {
            background: #fff;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
        }

        .overview-label {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .overview-value {
            font-size: 28px;
            line-height: 1.2;
            font-weight: 700;
            color: #111827;
        }

        .overview-sub {
            margin-top: 8px;
            font-size: 12px;
            color: #9ca3af;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1.35fr;
            gap: 16px;
        }

        .section-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }

        .inner-box {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
            min-height: 400px;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin: 14px 0 16px;
        }

        .filter-row .layui-input-inline,
        .filter-row .layui-form-select,
        .filter-row .layui-input,
        .filter-row .layui-select-title {
            width: 100%;
        }

        .filter-item {
            min-width: 180px;
        }

        .progress-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #eef2f7;
            margin-top: 6px;
        }

        .progress-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            line-height: 1.8;
        }

        .progress-row:last-child {
            margin-bottom: 0;
        }

        .progress-label {
            width: 92px;
            color: #6b7280;
            font-size: 14px;
            flex-shrink: 0;
        }

        .progress-value {
            color: #111827;
            font-size: 14px;
            font-weight: 600;
        }

        .step-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .step {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 600;
        }

        .step::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #d1d5db;
            display: inline-block;
        }

        .step.active {
            color: #16a34a;
        }

        .step.active::before {
            background: #16a34a;
        }

        .step-line {
            width: 28px;
            height: 2px;
            background: #d1d5db;
        }

        .action-row {
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .hint-text {
            color: #9ca3af;
            font-size: 13px;
        }

        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .table-toolbar-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.2;
        }

        .status-pending {
            background: #fff7e6;
            color: #d97706;
        }

        .status-approved {
            background: #ecfdf3;
            color: #16a34a;
        }

        .status-rejected {
            background: #fef2f2;
            color: #dc2626;
        }

        .status-review {
            background: #eff6ff;
            color: #2563eb;
        }

        .biz-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            background: #f3f4f6;
            color: #374151;
            font-size: 12px;
            font-weight: 600;
        }

        .empty-box {
            padding: 40px 20px;
            text-align: center;
            color: #9ca3af;
        }

        .muted {
            color: #9ca3af;
            font-size: 12px;
        }

        .mobile-break {
            display: none;
        }

        @media (max-width: 1200px) {
            .overview-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .two-col {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .layout {
                display: block;
            }

            .sidebar {
                width: 100%;
            }

            .overview-grid {
                grid-template-columns: 1fr;
            }

            .topbar {
                justify-content: center;
                gap: 20px;
            }

            .mobile-break {
                display: inline;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-header">员工端 HR 助手</div>
        <div class="sidebar-group-title">员工菜单</div>
        <a class="menu-item" href="/employee/chat.html">智能助手</a>
        <a class="menu-item" href="/employee/applications.html">我的申请</a>
        <a class="menu-item active" href="/employee/approvals.html">审批进度</a>
        <a class="menu-item" href="/employee/notifications.html">消息中心</a>
    </aside>

    <div class="main">
        <div class="topbar">
            <a href="/employee/chat.html">智能助手</a>
            <a href="/employee/notifications.html">消息中心</a>
        </div>

        <div class="content">
            <div class="overview-grid">
                <div class="overview-card">
                    <div class="overview-label">待处理审批</div>
                    <div class="overview-value" id="pendingCount">0</div>
                    <div class="overview-sub">包含待审批与待复核</div>
                </div>
                <div class="overview-card">
                    <div class="overview-label">已通过</div>
                    <div class="overview-value" id="approvedCount">0</div>
                    <div class="overview-sub">已完成通过的申请</div>
                </div>
                <div class="overview-card">
                    <div class="overview-label">已驳回</div>
                    <div class="overview-value" id="rejectedCount">0</div>
                    <div class="overview-sub">需要补充材料或重新提交</div>
                </div>
                <div class="overview-card">
                    <div class="overview-label">最近申请类型</div>
                    <div class="overview-value" id="latestType">--</div>
                    <div class="overview-sub">按最近创建记录展示</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">审批进度与历史审批</h2>
                    <button class="layui-btn layui-btn-normal" id="refreshBtn">刷新</button>
                </div>
            </div>

            <div class="two-col">
                <div class="inner-box">
                    <h3 class="section-title">最近一条审批进度</h3>

                    <div class="filter-row layui-form">
                        <div class="filter-item">
                            <select id="latestBusinessType" lay-search>
                                <option value="">全部</option>
                                <option value="LEAVE">请假</option>
                                <option value="OFFICE_SUPPLY">办公用品</option>
                                <option value="CERTIFICATE">证明申请</option>
                            </select>
                        </div>
                        <button class="layui-btn" id="queryLatestBtn">查询最新进度</button>
                    </div>

                    <div id="latestApprovalBox" class="progress-card">
                        <div class="empty-box">点击“查询最新进度”后展示</div>
                    </div>

                    <div class="action-row">
                        <button class="layui-btn layui-btn-primary" id="remindBtn" disabled>当前不可催办</button>
                        <span class="hint-text" id="remindHint">只有满足条件的审批单才支持催办。</span>
                    </div>
                </div>

                <div class="inner-box">
                    <div class="table-toolbar">
                        <h3 class="section-title">历史审批</h3>
                        <div class="table-toolbar-right layui-form">
                            <div style="min-width: 120px;">
                                <select id="historyBusinessType">
                                    <option value="">全部类型</option>
                                    <option value="LEAVE">请假</option>
                                    <option value="OFFICE_SUPPLY">办公用品</option>
                                    <option value="CERTIFICATE">证明申请</option>
                                </select>
                            </div>
                            <div style="min-width: 120px;">
                                <select id="historyStatus">
                                    <option value="">全部状态</option>
                                    <option value="PENDING">待审批</option>
                                    <option value="PENDING_REVIEW">待复核</option>
                                    <option value="APPROVED">已通过</option>
                                    <option value="REJECTED">已驳回</option>
                                </select>
                            </div>
                            <button class="layui-btn layui-btn-primary" id="queryHistoryBtn">查询</button>
                        </div>
                    </div>

                    <table class="layui-table" style="margin:0;">
                        <thead>
                        <tr>
                            <th style="width: 90px;">审批 ID</th>
                            <th style="width: 120px;">业务类型</th>
                            <th style="width: 120px;">状态</th>
                            <th style="width: 120px;">申请人</th>
                            <th>提交时间</th>
                        </tr>
                        </thead>
                        <tbody id="historyTableBody">
                        <tr>
                            <td colspan="5" class="empty-box">正在加载...</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/layui.js">
    <script src="/assets/auth.js"></script>
<script>
    const BUSINESS_TYPE_MAP = {
        LEAVE: '请假',
        OFFICE_SUPPLY: '办公用品',
        CERTIFICATE: '证明申请',
        EXPENSE: '报销'
    };

    const STATUS_MAP = {
        PENDING: '待审批',
        PENDING_REVIEW: '待复核',
        APPROVED: '已通过',
        REJECTED: '已驳回',
        NOT_FOUND: '未找到'
    };

    const NODE_MAP = {
        '直属经理审批': '直属经理审批中',
        'HR审批': 'HR 审批中',
        'HR复核': 'HR 复核中',
        '行政审批': '行政审批中',
        '审批完成': '审批已完成',
        '已驳回': '审批已驳回',
        '无': '无'
    };

    let currentUser = null;
    let currentLatestApproval = null;
    let layuiForm = null;
    let layuiLayer = null;

    async function requestJson(url, options = {}) {
        const res = await sessionFetch(url, {
            ...options,
            method: options.method || 'GET'
        });

        if (!res.ok) {
            throw new Error('请求失败：' + res.status);
        }

        return await res.json();
    }

    function buildFrontUser(loginUser) {
        return {
            userId: loginUser.userId,
            userName: loginUser.displayName || loginUser.username || '当前员工',
            role: loginUser.role
        };
    }

    function formatBusinessType(value) {
        return BUSINESS_TYPE_MAP[value] || value || '--';
    }

    function formatStatus(value) {
        return STATUS_MAP[value] || value || '--';
    }

    function formatNode(value) {
        return NODE_MAP[value] || value || '--';
    }

    function formatTime(value) {
        if (!value) return '--';
        return String(value).replace('T', ' ').slice(0, 16);
    }

    function formatRemainTime(value) {
        if (value === null || value === undefined || value === '') {
            return '待系统评估';
        }
        return value;
    }

    function formatStayDays(data) {
        if (!data) return '--';

        if (data.stayDays !== null && data.stayDays !== undefined) {
            return data.stayDays + '天';
        }

        if (data.stayDuration) {
            return data.stayDuration;
        }

        return '--';
    }

    function formatRemindFlag(value) {
        return value ? '可催办' : '暂不可催办';
    }

    function getStatusClass(status) {
        if (status === 'APPROVED') return 'status-tag status-approved';
        if (status === 'REJECTED') return 'status-tag status-rejected';
        if (status === 'PENDING_REVIEW') return 'status-tag status-review';
        return 'status-tag status-pending';
    }

    function escapeHtml(text) {
        return String(text ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderOverview(list) {
        const safeList = Array.isArray(list) ? list : [];

        const pendingCount = safeList.filter(item =>
            item.status === 'PENDING' || item.status === 'PENDING_REVIEW'
        ).length;

        const approvedCount = safeList.filter(item => item.status === 'APPROVED').length;
        const rejectedCount = safeList.filter(item => item.status === 'REJECTED').length;
        const latestType = safeList.length ? formatBusinessType(safeList[0].businessType) : '--';

        document.getElementById('pendingCount').innerText = pendingCount;
        document.getElementById('approvedCount').innerText = approvedCount;
        document.getElementById('rejectedCount').innerText = rejectedCount;
        document.getElementById('latestType').innerText = latestType;
    }

    function buildStepHtml(data) {
        const status = data?.status;
        const currentNode = data?.currentNode || '';

        let step2Active = false;
        let step3Active = false;

        if (status === 'PENDING' || status === 'PENDING_REVIEW') {
            step2Active = true;
        }

        if (status === 'APPROVED' || status === 'REJECTED') {
            step2Active = true;
            step3Active = true;
        }

        let finalText = '已完成';
        if (status === 'REJECTED') {
            finalText = '已驳回';
        }

        return `
            <div class="step-wrap">
                <span class="step active">已提交</span>
                <span class="step-line"></span>
                <span class="step ${step2Active ? 'active' : ''}">${escapeHtml(formatNode(currentNode))}</span>
                <span class="step-line"></span>
                <span class="step ${step3Active ? 'active' : ''}">${escapeHtml(finalText)}</span>
            </div>
        `;
    }

    function renderLatestApproval(data) {
        const box = document.getElementById('latestApprovalBox');
        const remindBtn = document.getElementById('remindBtn');
        const remindHint = document.getElementById('remindHint');

        currentLatestApproval = data || null;

        if (!data || data.status === 'NOT_FOUND') {
            box.innerHTML = '<div class="empty-box">暂无最近审批记录</div>';
            remindBtn.disabled = true;
            remindBtn.innerText = '当前不可催办';
            remindHint.innerText = '当前没有可催办的审批单。';
            return;
        }

        box.innerHTML = `
            <div style="margin-bottom:16px;">${buildStepHtml(data)}</div>

            <div class="progress-row">
                <div class="progress-label">审批单号</div>
                <div class="progress-value">#${escapeHtml(data.approvalId ?? '--')}</div>
            </div>
            <div class="progress-row">
                <div class="progress-label">申请类型</div>
                <div class="progress-value">${escapeHtml(formatBusinessType(data.businessType))}</div>
            </div>
            <div class="progress-row">
                <div class="progress-label">审批状态</div>
                <div class="progress-value">
                    <span class="${getStatusClass(data.status)}">${escapeHtml(formatStatus(data.status))}</span>
                </div>
            </div>
            <div class="progress-row">
                <div class="progress-label">当前进度</div>
                <div class="progress-value">${escapeHtml(formatNode(data.currentNode))}</div>
            </div>
            <div class="progress-row">
                <div class="progress-label">停留时长</div>
                <div class="progress-value">${escapeHtml(formatStayDays(data))}</div>
            </div>
            <div class="progress-row">
                <div class="progress-label">预计处理</div>
                <div class="progress-value">${escapeHtml(formatRemainTime(data.estimatedRemainingTime))}</div>
            </div>
            <div class="progress-row">
                <div class="progress-label">催办状态</div>
                <div class="progress-value">${escapeHtml(formatRemindFlag(data.canRemind))}</div>
            </div>
        `;

        remindBtn.disabled = !data.canRemind;
        remindBtn.innerText = data.canRemind ? '发送催办' : '当前不可催办';
        remindHint.innerText = data.canRemind
            ? '这条审批支持催办提醒。'
            : '当前审批状态下不可催办。';
    }

    function renderHistoryTable(list) {
        const tbody = document.getElementById('historyTableBody');

        if (!Array.isArray(list) || !list.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-box">暂无数据</td></tr>';
            return;
        }

        tbody.innerHTML = list.map(item => `
            <tr>
                <td>#${escapeHtml(item.approvalId ?? '--')}</td>
                <td><span class="biz-tag">${escapeHtml(formatBusinessType(item.businessType))}</span></td>
                <td><span class="${getStatusClass(item.status)}">${escapeHtml(formatStatus(item.status))}</span></td>
                <td>${escapeHtml(item.applicantName || currentUser.userName || '--')}</td>
                <td>
                    ${escapeHtml(formatTime(item.createdAt))}
                    <div class="muted">${escapeHtml(formatNode(item.currentNode || ''))}</div>
                </td>
            </tr>
        `).join('');
    }

    async function loadLatestApproval() {
        const businessType = document.getElementById('latestBusinessType').value;
        const params = new URLSearchParams();

        if (businessType) {
            params.set('businessType', businessType);
        }

        try {
            const query = params.toString();
            const res = await requestJson(`/employee/approvals/latest${query ? '?' + query : ''}`);
            renderLatestApproval(res.data || null);
        } catch (e) {
            renderLatestApproval(null);
            layuiLayer.msg('加载最新进度失败：' + e.message);
        }
    }

    async function loadHistory() {
        const businessType = document.getElementById('historyBusinessType').value;
        const status = document.getElementById('historyStatus').value;

        const params = new URLSearchParams();

        if (businessType) {
            params.set('businessType', businessType);
        }

        if (status) {
            params.set('status', status);
        }

        try {
            const query = params.toString();
            const res = await requestJson(`/employee/approvals/history${query ? '?' + query : ''}`);
            const list = Array.isArray(res.data) ? res.data : [];
            renderHistoryTable(list);
            renderOverview(list);
        } catch (e) {
            renderHistoryTable([]);
            renderOverview([]);
            layuiLayer.msg('加载历史审批失败：' + e.message);
        }
    }

    async function refreshAll() {
        await Promise.all([loadLatestApproval(), loadHistory()]);
    }

    async function remindCurrentApproval() {
        if (!currentLatestApproval || !currentLatestApproval.approvalId) {
            layuiLayer.msg('当前没有可催办的审批单');
            return;
        }

        if (!currentLatestApproval.canRemind) {
            layuiLayer.msg('当前审批不可催办');
            return;
        }

        try {
            const approvalId = currentLatestApproval.approvalId;
            const res = await requestJson(`/employee/approvals/${approvalId}/remind`, {
                method: 'POST'
            });
            layuiLayer.msg(res.data || res.message || '催办已发送');
            await loadLatestApproval();
        } catch (e) {
            layuiLayer.msg('催办失败：' + e.message);
        }
    }

    layui.use(['form', 'layer'], async function () {
        layuiForm = layui.form;
        layuiLayer = layui.layer;

        const loginUser = await getCurrentUser('EMPLOYEE');
        if (!loginUser) {
            return;
        }

        currentUser = buildFrontUser(loginUser);

        document.getElementById('queryLatestBtn').addEventListener('click', loadLatestApproval);
        document.getElementById('queryHistoryBtn').addEventListener('click', loadHistory);
        document.getElementById('refreshBtn').addEventListener('click', refreshAll);
        document.getElementById('remindBtn').addEventListener('click', remindCurrentApproval);

        layuiForm.render();
        await refreshAll();
    });
</script>
</body>
</html>
